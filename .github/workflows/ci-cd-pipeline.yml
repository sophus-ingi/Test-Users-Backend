name: CI/CD Pipeline

on:
  push:
    branches: [ main, asger-test, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mariadb:11
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_DATABASE: addresses
        options: >-
          --cap-add=SYS_NICE
        ports:
          - 3306:3306

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Wait for MySQL to start
      run: sleep 5
    
    - name: Initialize database
      env:
        DB_HOST: localhost
        DB_NAME: addresses
        DB_USER: root
        DB_PASSWORD: ''
      run: python scripts/init_db.py
    
    - name: Run unit tests
      env:
        DB_HOST: localhost
        DB_NAME: addresses
        DB_USER: root
        DB_PASSWORD: ''
      run: |
        python -m pytest tests/test_fake_info.py -v --tb=short
    
    - name: Run integration tests
      env:
        DB_HOST: localhost
        DB_NAME: addresses
        DB_USER: root
        DB_PASSWORD: ''
      run: |
        python -m pytest tests/test_api_endpoints.py -v --tb=short
    
    - name: Generate test coverage report
      env:
        DB_HOST: localhost
        DB_NAME: addresses
        DB_USER: root
        DB_PASSWORD: ''
      run: |
        pip install pytest-cov
        python -m pytest tests/ --ignore=tests/test_e2e_playwright.py --cov=src --cov=app --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false
    
    - name: Run SonarQube analysis
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      continue-on-error: true
    
    - name: Build Docker image
      run: |
        docker build -t test-users-backend:${{ github.sha }} .
    
    - name: Test Docker build
      run: |
        docker compose build

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black isort
    
    - name: Check code formatting with Black
      run: black --check src/ app.py tests/
      continue-on-error: true
    
    - name: Check import sorting with isort
      run: isort --check-only src/ app.py tests/
      continue-on-error: true
    
    - name: Lint with Flake8
      run: flake8 src/ app.py tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Lint with Pylint
      run: pylint src/*.py app.py --exit-zero --max-line-length=120
      continue-on-error: true
    
    - name: Security check with Bandit
      run: |
        pip install bandit
        bandit -r src/ app.py --skip B101,B601
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install safety
    
    - name: Check for known vulnerabilities
      run: safety check
      continue-on-error: true
    
    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        path: '.'
        format: 'JSON'
        args: >
          --enable-retired
      continue-on-error: true

  docker-build-and-test:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build and test with Docker Compose
      run: |
        docker compose -f docker-compose.yml build
        docker compose -f docker-compose.yml up -d
        sleep 10
        # Run a quick test against the running container
        curl -f http://localhost:8080/cpr || exit 1
        curl -f http://localhost:8080/person?n=3 || exit 1
        docker compose -f docker-compose.yml down
